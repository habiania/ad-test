<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>페이지를 찾을 수 없습니다 - XP Image Tools</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="stylesheet" href="/css/common.css">
  <link rel="stylesheet" href="/css/xp-theme.css">
  <style>
    body { overflow: auto; }
    .err-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .err-box {
      background: #ECE9D8;
      border: 2px solid #1A46A8;
      border-radius: 8px 8px 4px 4px;
      box-shadow: 4px 4px 16px rgba(0,0,0,0.3);
      width: 420px;
      max-width: 100%;
      overflow: hidden;
    }
    .err-titlebar {
      background: linear-gradient(180deg,#1F5EBF 0%,#2B7BDB 8%,#2564C1 92%,#1A4D9E 100%);
      padding: 4px 8px;
      display: flex;
      align-items: center;
      gap: 6px;
      color: white;
      font-family: 'Tahoma', Arial, sans-serif;
      font-size: 12px;
      font-weight: bold;
      user-select: none;
    }
    .err-body {
      padding: 24px;
      background: white;
      text-align: center;
    }
    .err-icon { font-size: 48px; margin-bottom: 12px; }
    .err-title {
      font-family: 'Tahoma', Arial, sans-serif;
      font-size: 16px;
      font-weight: bold;
      color: #CC0000;
      margin-bottom: 8px;
    }
    .err-msg {
      font-family: 'Tahoma', Arial, sans-serif;
      font-size: 12px;
      color: #333;
      line-height: 1.7;
      margin-bottom: 20px;
    }
    .err-code {
      font-family: monospace;
      font-size: 48px;
      font-weight: bold;
      color: #C0C0C0;
      margin-bottom: 8px;
    }
  </style>
  <!-- Google Analytics 4 -->
  <!-- TODO: GA_MEASUREMENT_ID를 실제 측정 ID(G-XXXXXXXXXX)로 교체하세요 -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=GA_MEASUREMENT_ID"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag("js", new Date());
    gtag("config", "GA_MEASUREMENT_ID");
  </script>
</head>
<body>
<div class="err-wrap">
  <div class="err-box">
    <div class="err-titlebar">
      <span>⚠️</span>
      <span>오류 - XP Image Tools</span>
    </div>
    <div class="err-body">
      <div class="err-code">404</div>
      <div class="err-icon">🔍</div>
      <div class="err-title">페이지를 찾을 수 없습니다</div>
      <div class="err-msg">
        요청하신 페이지가 존재하지 않거나 이동되었습니다.<br>
        주소를 다시 확인하거나 홈으로 이동해 주세요.
      </div>
      <a href="/index.html" class="xp-btn xp-btn-primary" style="display:inline-block;text-decoration:none;padding:6px 20px;">
        🏠 홈으로 돌아가기
      </a>
    </div>
  </div>
</div>
</body>
</html>
