    #resize-editor { display: none; }

    .size-input-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }

    .status-ok { color: #006000; } .status-error { color: #CC0000; } .status-info { color: #000080; }
    #resize-progress { display: none; margin: 4px 0; }
