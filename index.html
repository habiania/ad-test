<body>
  <div class="settings-grid">
    <div class="xp-groupbox" role="group" aria-labelledby="size-group-title">
      <span class="xp-groupbox-title" id="size-group-title">크기 설정</span>
      <div class="xp-form-row size-input-row">
        <label class="xp-form-label" for="resize-width">가로</label>
        <input type="number" id="resize-width" class="xp-input" min="1" max="8000" placeholder="1920" disabled aria-label="가로 픽셀 크기">
        <span class="size-px">px</span>
      </div>
      <div class="xp-form-row size-input-row">
        <label class="xp-form-label" for="resize-height">세로</label>
        <input type="number" id="resize-height" class="xp-input" min="1" max="8000" placeholder="1080" disabled aria-label="세로 픽셀 크기">
        <span class="size-px">px</span>
      </div>
      <div class="xp-form-row ratio-row">
        <label class="xp-checkbox-wrap" for="keep-ratio">
          <input type="checkbox" id="keep-ratio" class="xp-checkbox" checked aria-label="비율 유지">
          비율 유지
        </label>
      </div>
      <div style="margin-top:6px;">
        <div style="font-family:'Tahoma',Arial,sans-serif;font-size:10px;color:#666;margin-bottom:4px;">빠른 선택:</div>
        <div style="display:flex;gap:4px;flex-wrap:wrap;">
          <button class="xp-btn" style="padding:2px 6px;font-size:10px;" data-preset="1920,1080" aria-label="1920×1080으로 설정">FHD</button>
          <button class="xp-btn" style="padding:2px 6px;font-size:10px;" data-preset="1280,720" aria-label="1280×720으로 설정">HD</button>
          <button class="xp-btn" style="padding:2px 6px;font-size:10px;" data-preset="800,600" aria-label="800×600으로 설정">800</button>
          <button class="xp-btn" style="padding:2px 6px;font-size:10px;" data-preset="640,480" aria-label="640×480으로 설정">VGA</button>
          <button class="xp-btn" style="padding:2px 6px;font-size:10px;" data-preset="200,200" aria-label="200×200으로 설정">200²</button>
        </div>
      </div>
    </div>
    <div class="xp-groupbox" role="group" aria-labelledby="output-group-title">
      <span class="xp-groupbox-title" id="output-group-title">출력 설정</span>
      <div class="xp-form-row format-row">
        <label class="xp-form-label" for="output-format">형식</label>
        <select id="output-format" class="xp-select" aria-label="출력 이미지 형식 선택">
          <option value="same">원본 유지</option>
          <option value="jpg">JPG</option>
          <option value="png">PNG</option>
          <option value="webp">WEBP</option>
        </select>
      </div>
      <div class="xp-form-row" id="quality-wrap">
        <label class="xp-form-label" for="quality-slider">품질</label>
        <input type="range" id="quality-slider" class="xp-slider" min="10" max="100" value="92" aria-label="이미지 품질 (10~100%)">
        <span id="quality-label" style="font-family:'Tahoma',Arial,sans-serif;font-size:10px;min-width:30px;">92%</span>
      </div>
      <div style="margin-top:8px;padding:6px;background:#FFF8E8;border:1px solid #D0C080;font-family:'Tahoma',Arial,sans-serif;font-size:10px;color:#806000;line-height:1.5;">
        💡 JPG/WEBP: 품질 조절 가능<br>
        PNG: 무손실 압축 (품질 설정 없음)
      </div>
    </div>
  </div>
  <div id="resize-progress" class="xp-progressbar" aria-label="변환 진행 중" aria-live="polite">
    <div class="xp-progressbar-fill" style="width:100%;"></div>
  </div>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px;flex-wrap:wrap;gap:6px;">
    <div class="btn-group">
      <button id="resize-btn" class="xp-btn xp-btn-primary" disabled aria-label="이미지 크기 변환 실행">⚡ 변환 실행</button>
      <button id="download-btn" class="xp-btn" disabled aria-label="변환된 이미지 다운로드">💾 다운로드</button>
      <button id="reset-btn" class="xp-btn" aria-label="초기화">🔄 초기화</button>
    </div>
  </div>
</body>
